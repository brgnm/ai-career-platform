version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       nexcareer_db
      POSTGRES_USER:     nexcareer_user
      POSTGRES_PASSWORD: nexcareer_pass
    ports:
      - "5432:5432"          # доступен локально на этом порту
    volumes:
      - postgres_data:/var/lib/postgresql/data   # данные не теряются при restart
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexcareer_user -d nexcareer_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ─────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://nexcareer_user:nexcareer_pass@db:5432/nexcareer_db
    depends_on:
      db:
        condition: service_healthy   # ждём пока PostgreSQL готов
    command: >
      sh -c "alembic upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
